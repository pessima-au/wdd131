<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NASA Photo of the Day">
  <meta name="author" content="Albert Pessima">
  <script defer src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <title>NASA Photo of the Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles/nasa.css">
  <link rel="stylesheet" href="../styles/gallery.css">
</head>

<body>
  <header>
    <nav>
      <ul>
        <li><a href="../nasa.html">Home</a></li>
        <li><a href="gallery.html" class="active">Photo Gallery</a></li>
        <li><a href="../about/about.html">About/Contact</a></li>
        <li><a href="../attribution/attribution.html" target="_self" >Attributions</a></li>
      </ul>
    </nav>
    <div class="Search">
      <h1>NASA Photo Gallery</h1>
      <form id="search-form">
        <label for="search-year">Year:</label>
        <select id="search-year" required></select>

        <label for="search-month">Month:</label>
        <select id="search-month" required>
          <option value="" disabled selected>Select Month</option>
        </select>

        <label for="search-day">Day:</label>
        <select id="search-day" required>
          <option value="" disabled selected>Select Day</option>
        </select>

        <button type="submit">Search</button>
      </form>
    </div>


  </header>

  <main>
    <!-- Gallery Section -->
    <div id="loading" class="hidden">Loading...</div>
    <section id="gallery">
      <!-- Images will be dynamically inserted here -->

    </section>

    <!-- Load More Button -->
    <button id="load-more-btn">Load More</button>

    <!-- Modal for viewing images -->
    <div id="modal" class="hidden">
      <div class="modal-content">
        <button id="close-modal" type="button">X</button>
        <img id="modal-image" src="" alt="NASA Image">
        <div id="description">
          <h2 id="modal-title"></h2>
          <p id="modal-description"></p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 NASA Photo App | <a href="../attribution/attribution.html" target="_blank">Attributions</a></p>
  </footer>

  <script src="../scripts/gallery.js" defer></script>
</body>

</html>
